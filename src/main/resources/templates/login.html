<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .gs-loading {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(2px);
            z-index: 2000;
        }
    </style>
</head>
<body class="bg-light">
<div id="gsLoading" class="gs-loading d-none" role="status" aria-live="polite">
    <div class="d-flex align-items-center gap-2 text-secondary">
        <div class="spinner-border spinner-border-sm" aria-hidden="true"></div>
        <div>Loading...</div>
    </div>
</div>
<div class="container min-vh-100 d-flex flex-column justify-content-center align-items-center py-5">
    <div class="text-center mb-4">
        <svg width="56" height="56" viewBox="0 0 64 64" fill="none" aria-hidden="true">
            <circle cx="32" cy="32" r="28" fill="#0d6efd"/>
            <path d="M20 34c6-14 18-18 24-18-2 8-8 20-24 18Z" fill="white" opacity="0.9"/>
            <path d="M22 40c12 2 22-4 26-10-2 10-10 22-26 10Z" fill="white" opacity="0.75"/>
        </svg>
        <div class="fw-semibold fs-4 mt-2">GoSmart Admin Portal</div>
    </div>

    <div class="card shadow-sm" style="width: min(420px, 92vw);">
        <div class="card-body p-4">
            <div th:if="${alertMessage != null}" class="alert mb-3" role="alert"
                 th:classappend="${alertType != null} ? ' alert-' + ${alertType} : ' alert-warning'">
                <span th:text="${alertMessage}">Please login.</span>
            </div>

            <form id="loginForm" method="post" th:action="@{/login}" th:object="${loginForm}">
                <input type="hidden" name="_csrf" th:value="${csrfToken}">
                <div class="mb-3">
                    <label class="form-label" for="userId">User Id</label>
                    <input class="form-control" id="userId" type="text" th:field="*{userId}" autocomplete="username">
                    <div id="userIdError" class="text-danger small mt-1" th:text="${userIdError}"
                         th:classappend="${userIdError == null} ? ' d-none' : ''"></div>
                </div>

                <div class="mb-2">
                    <label class="form-label" for="password">Password</label>
                    <input class="form-control" id="password" type="password" th:field="*{password}" autocomplete="current-password">
                    <div id="passwordError" class="text-danger small mt-1" th:text="${passwordError}"
                         th:classappend="${passwordError == null} ? ' d-none' : ''"></div>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-3">
                    <a class="small text-decoration-none" href="#">Forgot Password</a>
                </div>

                <button class="btn btn-primary w-100" type="submit">Login</button>
            </form>
        </div>
    </div>
</div>

<script th:src="@{/js/session-fetch.js}"></script>
<script>
    (() => {
        const form = document.getElementById("loginForm");
        const userId = document.getElementById("userId");
        const password = document.getElementById("password");
        const userIdError = document.getElementById("userIdError");
        const passwordError = document.getElementById("passwordError");
        const loading = document.getElementById("gsLoading");
        const submitBtn = form ? form.querySelector('button[type="submit"]') : null;

        if (!form || !userId || !password || !userIdError || !passwordError) return;

        const setError = (el, message) => {
            el.textContent = message || "";
            if (message) el.classList.remove("d-none");
            else el.classList.add("d-none");
        };

        const showLoading = () => {
            if (submitBtn) submitBtn.disabled = true;
            if (loading) loading.classList.remove("d-none");
        };

        const hideLoading = () => {
            if (submitBtn) submitBtn.disabled = false;
            if (loading) loading.classList.add("d-none");
        };

        let navigating = false;

        const validate = () => {
            let ok = true;
            if (userId.value.trim() === "") {
                setError(userIdError, "User Id is required");
                ok = false;
            } else {
                setError(userIdError, "");
            }

            if (password.value.trim() === "") {
                setError(passwordError, "Password is required");
                ok = false;
            } else {
                setError(passwordError, "");
            }
            return ok;
        };

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            if (!validate()) {
                return;
            }
            showLoading();
            navigating = false;

            const gsAuth = window.GSAuth || {};
            const doFetch = gsAuth.fetchWithSessionHandling || window.fetch.bind(window);
            const formData = new FormData(form);
            const body = new URLSearchParams(formData);
            try {
                const response = await doFetch(form.action, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/x-www-form-urlencoded",
                        "Accept": "text/html"
                    },
                    body: body
                });
                if (response.redirected && response.url) {
                    navigating = true;
                    window.location.replace(response.url);
                    return;
                }
                const html = await response.text();
                if (html) {
                    document.open();
                    document.write(html);
                    document.close();
                    return;
                }
            } catch (err) {
                setError(passwordError, "Login failed");
            } finally {
                if (!navigating) {
                    hideLoading();
                }
            }
        });

        userId.addEventListener("input", validate);
        password.addEventListener("input", validate);
    })();
</script>
</body>
</html>

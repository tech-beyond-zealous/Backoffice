<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Test Function</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .gs-loading {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(2px);
            z-index: 2000;
        }

        .gs-main {
            width: 100%;
        }

        @media (min-width: 768px) {
            .gs-main {
                width: 90%;
            }
        }
    </style>
</head>
<body>
<div id="gsLoading" class="gs-loading" role="status" aria-live="polite">
    <div class="d-flex align-items-center gap-2 text-secondary">
        <div class="spinner-border spinner-border-sm" aria-hidden="true"></div>
        <div>Loading...</div>
    </div>
</div>

<div th:replace="~{fragments/nav :: topNav(${appVersion}, ${menuGroups}, ${userId}, ${selectedApplicationSystemId})}"></div>

<main class="container-fluid py-4">
    <div class="gs-main mx-auto">
        <section class="p-4 p-md-5 rounded-3 bg-light border">
            <h1 class="display-6 mb-3">Test Function Permission</h1>
            <div class="text-body-secondary mb-4">
                Path: <span class="fw-semibold" th:text="${requestPath}">/testfunction</span>
                <span class="mx-2">|</span>
                Function Code: <span class="fw-semibold" th:text="${functionCode}">TEST_FUNCTION</span>
            </div>

            <div th:if="${permission == null}" class="alert alert-warning mb-0" role="alert">
                No permission loaded for this path. Add function.path = <span class="fw-semibold">/testfunction</span> and assign via user_function.
            </div>

            <div th:if="${permission != null}" class="row g-3">
                <div class="col-12 col-md-3">
                    <div class="card h-100">
                        <div class="card-body">
                            <div class="text-body-secondary small">Create</div>
                            <div class="fs-4 fw-semibold" th:text="${permission.create} ? 'Y' : 'N'">Y</div>
                        </div>
                    </div>
                </div>
                <div class="col-12 col-md-3">
                    <div class="card h-100">
                        <div class="card-body">
                            <div class="text-body-secondary small">Edit</div>
                            <div class="fs-4 fw-semibold" th:text="${permission.edit} ? 'Y' : 'N'">Y</div>
                        </div>
                    </div>
                </div>
                <div class="col-12 col-md-3">
                    <div class="card h-100">
                        <div class="card-body">
                            <div class="text-body-secondary small">Delete</div>
                            <div class="fs-4 fw-semibold" th:text="${permission.delete} ? 'Y' : 'N'">Y</div>
                        </div>
                    </div>
                </div>
                <div class="col-12 col-md-3">
                    <div class="card h-100">
                        <div class="card-body">
                            <div class="text-body-secondary small">View</div>
                            <div class="fs-4 fw-semibold" th:text="${permission.view} ? 'Y' : 'N'">Y</div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">window.GS_IDLE_TIMEOUT_MINUTES = [[${idleTimeoutMinutes}]];</script>
<script th:src="@{/js/idle-timer.js(v=${idleTimeoutMinutes})}"></script>
<script>
    window.addEventListener("load", () => {
        const loading = document.getElementById("gsLoading");
        if (loading) loading.classList.add("d-none");
    });
</script>
<script>
    (() => {
        const form = document.getElementById("logoutForm");
        const btn = document.getElementById("logoutBtn");
        const loading = document.getElementById("gsLoading");
        if (!form || !loading) return;

        form.addEventListener("submit", () => {
            if (btn) btn.disabled = true;
            loading.classList.remove("d-none");
        });
    })();
</script>
</body>
</html>

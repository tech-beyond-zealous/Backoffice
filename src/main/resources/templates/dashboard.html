<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .gs-loading {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(2px);
            z-index: 2000;
        }

        .gs-main {
            width: 100%;
        }

        @media (min-width: 768px) {
            .gs-main {
                width: 90%;
            }
        }
    </style>
</head>
<body>
<div id="gsLoading" class="gs-loading" role="status" aria-live="polite">
    <div class="d-flex align-items-center gap-2 text-secondary">
        <div class="spinner-border spinner-border-sm" aria-hidden="true"></div>
        <div>Loading...</div>
    </div>
</div>

<div th:replace="~{fragments/nav :: topNav(${appVersion}, ${menuGroups}, ${userId}, ${selectedApplicationSystemId})}"></div>

<main class="container-fluid py-4">
    <div class="gs-main mx-auto">
    <section class="p-4 p-md-5 rounded-3 bg-light border">
        <h1 class="display-6 mb-2">Dashboard</h1>
        <p class="text-body-secondary mb-0">Protected home screen.</p>
    </section>

    <section class="mt-4">
        <div class="d-flex align-items-center justify-content-between mb-3">
            <h2 class="h5 mb-0">Application System</h2>
        </div>

        <div class="row g-3" th:if="${applicationSystems != null and !#lists.isEmpty(applicationSystems)}">
            <div class="col-12 col-sm-6 col-md-4 col-lg-3" th:each="s : ${applicationSystems}">
                <a class="text-decoration-none" th:href="@{/dashboard(applicationSystemId=${s.applicationSystemId})}">
                    <div class="card h-100 shadow-sm"
                         th:classappend="${selectedApplicationSystemId != null and s.applicationSystemId == selectedApplicationSystemId} ? ' border-primary' : ' border-light'">
                        <div class="card-body">
                            <div class="fw-semibold" th:text="${s.systemName}">System Name</div>
                            <div class="text-body-secondary small" th:text="${s.systemCode}">SYSTEM_CODE</div>
                        </div>
                    </div>
                </a>
            </div>
        </div>

        <div class="alert alert-warning mb-0" role="alert"
             th:if="${applicationSystems == null or #lists.isEmpty(applicationSystems)}">
            No application system assigned.
        </div>
    </section>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">window.GS_IDLE_TIMEOUT_MINUTES = [[${idleTimeoutMinutes}]];</script>
<script th:src="@{/js/idle-timer.js(v=${idleTimeoutMinutes})}"></script>
<script>
    window.addEventListener("load", () => {
        const loading = document.getElementById("gsLoading");
        if (loading) loading.classList.add("d-none");
    });
</script>
<script>
    (() => {
        const form = document.getElementById("logoutForm");
        const btn = document.getElementById("logoutBtn");
        const loading = document.getElementById("gsLoading");
        if (!form || !loading) return;

        form.addEventListener("submit", () => {
            if (btn) btn.disabled = true;
            loading.classList.remove("d-none");
        });
    })();
</script>
</body>
</html>
